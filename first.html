    <table border="1">
      <!-- Caption -->
      <caption>
        Employee Information
      </caption>

      <!-- Table Header -->
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Position</th>
          <th>Salary</th>
        </tr>
      </thead>

      <tbody>
        <tr>

          <td>Alice</td>
          <td>Developer</td>
          <td>$80,000</td>
        </tr>
        <tr>

          <td>Designer</td>
          <td>$70,000</td>
        </tr>
        <tr>
          <td>3</td>
          <td>Carol</td>
          <td>Manager</td>
          <td>$90,000</td>
        </tr>
      </tbody>

      <!-- Table Footer -->
      <tfoot>
        <tr>
          <td colspan="3">Total Employees</td>
          <td>3</td>
        </tr>
      </tfoot>
