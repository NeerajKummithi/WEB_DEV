<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<link rel="stylesheet" href="style.css">
     <table border="1">
  <!-- Caption -->
  <caption>Employee Information</caption>

  <!-- Table Header -->
  <thead id="h">
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Position</th>
      <th>Salary</th>
    </tr>
  </thead>

  <!-- Table Body -->
  <tbody id="b">
    <tr>
      <td>1</td>
      <td>Alice</td>
      <td>Developer</td>
      <td>$80,000</td>
    </tr>
    <tr>
      <td>2</td>
      <td>Bob</td>
      <td>Designer</td>
      <td>$70,000</td>
    </tr>
    <tr>
      <td>3</td>
      <td>Carol</td>
      <td>Manager</td>
      <td>$90,000</td>
    </tr>
  </tbody>

  <!-- Table Footer -->
  <tfoot id="f">
    <tr>
      <td colspan="3">Total Employees</td>
      <td>3</td>
    </tr>
  </tfoot>
</table>

<input type="button" onclick="alert('Hello World!')" value="Click Me!">

<svg height="100" width="100">
    <circle cx="50" cy="50" r="40" stroke="black" stroke-width="5" fill="green" />
    
</svg><br>
<svg><circle cx="50" cy="50" stroke="black" stroke-width="5" fill="green" /></svg>

<iframe src="https://www.youtube.com/embed/VIDEO_ID" frameborder="0" allowfullscreen></iframe>

<canvas id="myCanvas" width="200" height="100"></canvas>
<blockquote cite="https://google.com">
  This is a long quote from an external source. This quote can span multiple lines and paragraphs.
</blockquote>
</body>
</html>
